<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Karaoke Studio</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Landing / Song Selection -->
        <section id="home-view" class="view active">
            <div class="hero">
                <h1 class="glow-text">NEON KARAOKE</h1>
                <p class="subtitle">Sing. Record. Shine.</p>
                <div class="song-card" id="demo-song-card">
                    <div class="song-info">
                        <h3 id="song-title">Cyberpunk City</h3>
                        <p id="song-artist">Synthwave Demo Track</p>
                    </div>
                    <button id="start-btn" class="primary-btn">START RECORDING</button>

                    <div class="upload-section" style="margin-top: 20px;">
                        <input type="file" id="mr-upload" accept=".mp3,audio/mpeg" style="display: none;">
                        <label for="mr-upload" id="upload-label" class="secondary-btn"
                            style="font-size: 0.8rem; display: inline-block; cursor: pointer;">Upload Own MR
                            (MP3)</label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Recording Studio -->
        <section id="studio-view" class="view hidden">
            <div class="studio-header">
                <button id="back-home-btn" class="icon-btn">←</button>
                <div class="status-indicator">● REC</div>
            </div>

            <div class="video-stage">
                <video id="preview-video" autoplay muted playsinline></video>
                <div class="lyrics-overlay">
                    <p id="current-lyric" class="lyric-line waiting">Get Ready...</p>
                    <p id="next-lyric" class="lyric-line next">Music starting soon</p>
                </div>
            </div>

            <div class="controls-bar">
                <button id="record-toggle-btn" class="record-btn"></button>
            </div>
        </section>

        <!-- Preview / Result -->
        <section id="result-view" class="view hidden">
            <h2>Your Performance</h2>
            <div class="video-container">
                <video id="playback-video" playsinline></video>
            </div>

            <!-- Visual Timeline Editor -->
            <div class="timeline-container"
                style="width: 90%; max-width: 600px; margin: 0 auto 20px; position: relative;">
                <canvas id="timeline-canvas" width="600" height="150"
                    style="width: 100%; height: 150px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid var(--glass-border); cursor: grab;"></canvas>
                <div class="timeline-legend"
                    style="display: flex; justify-content: space-between; font-size: 0.8rem; padding: 0 10px; color: rgba(255,255,255,0.6);">
                    <span style="color: var(--secondary-color)">Backing Track (Top)</span>
                    <span style="color: var(--primary-color)">Your Voice (Bottom - Drag to Sync)</span>
                </div>
            </div>

            <div class="controls-panel"
                style="width: 90%; max-width: 400px; margin: 0 auto 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
                <div class="control-group">
                    <label>Microphone Volume</label>
                    <input type="range" id="vol-mic" min="0" max="2" step="0.1" value="1">
                </div>
                <div class="control-group">
                    <label>Music Volume</label>
                    <input type="range" id="vol-music" min="0" max="2" step="0.1" value="0.8">
                </div>
                <!-- Sync slider is still useful for fine tuning, kept here but will be bi-directionally bound -->
                <div class="control-group">
                    <label>Sync (Delay Vocals)</label>
                    <input type="range" id="sync-slider" min="-500" max="500" step="10" value="0">
                    <div class="value-display" id="sync-val">0ms</div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="download-btn" class="primary-btn">SAVE MIX</button>
                <button id="retake-btn" class="secondary-btn">RETAKE</button>
            </div>
            <div id="render-status" style="margin-top: 10px; color: var(--primary-color);"></div>
        </section>
    </div>

    <!-- Hidden audio element for the backing track source -->
    <!-- Src will be set by JS or Upload -->
    <audio id="backing-track" crossorigin="anonymous"></audio>
    <!-- Using a simplified preview track from Deezer (Daft Punk - generic example placeholder if needed, replacing with a generic royalty free or generated beat URL in actual code if preferred. Let's use a placeholder placeholder first or a real URL if one exists.
    Actually, let's use a reliable placeholder or just assume I'll provide one.
     usage of 'https://actions.google.com/sounds/v1/science_fiction/human_futuristic_hum.ogg' as a dummy or similar public domain. 
    Let's stick to a generic placeholder for now and I can swap it. -->

    <script type="module" src="src/app.js"></script>
</body>

</html>
